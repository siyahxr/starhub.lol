<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarHUB | Elite Creator Identity</title>
    <meta name="description" content="StarHUB is the ultimate ecosystem for creators and brands.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="stars"></div>
    <div class="glow"></div>
    
    <main class="container">
        <div class="content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="StarHUB" class="logo">
                <h1 class="title">StarHUB</h1>
            </div>
            
            <a href="https://discord.gg/starhub" class="discord-btn">
                <span>Discord'a Katıl</span>
                <div class="btn-glow"></div>
            </a>
        </div>
    </main>

    <script>
        // Simple star field generation for background depth
        const starsContainer = document.querySelector('.stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            star.style.opacity = Math.random();
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
