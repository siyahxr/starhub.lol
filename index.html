        <!-- Footer -->

    <!-- Modal System -->

            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Toast System -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Script -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Modal Logic
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');

        function openModal(html) {
            modalContent.innerHTML = html;
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Toast Logic
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : 'info'}" style="width: 18px;"></i>
                <span>${message}</span>
            `;
            toastContainer.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        let communityList = [
            { name: 'Zypher_Design', short: 'UI/UX & Branding', avatar: '', bg: 'linear-gradient(45deg, #7c4dff, #ff4081)' },
            { name: 'NovaStreams', short: 'Stream Management', avatar: '', bg: 'linear-gradient(45deg, #00d2ff, #3a7bd5)' },
            { name: 'EliteEdits', short: 'Video Production', avatar: '', bg: 'linear-gradient(45deg, #f8ff00, #3ad59f)' }
        ];

        function handleFileUpload(type, input) {
            const file = input.files[0];
            if (!file) return;

            // Check file size (localStorage is limited)
            if (file.size > 4 * 1024 * 1024) {
                showToast('File too large! Max 4MB recommended.', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                pendingFiles[type] = e.target.result;
                const status = document.getElementById(type + '_status');
                if (status) {
                    status.style.display = 'block';
                    status.innerText = `Ready to push: ${file.name}`;
                }
            };
            reader.readAsDataURL(file);
        }

        function saveProfileSettings() {
            const fields = {
                'sh_username': 'setting_username',
                'sh_short_desc': 'setting_short_desc',
                'sh_bio': 'setting_bio',
                'sh_insta': 'setting_insta',
                'sh_tiktok': 'setting_tiktok',
                'sh_discord': 'setting_discord'
            };

            for (let [key, id] of Object.entries(fields)) {
                const el = document.getElementById(id);
                if (el) localStorage.setItem(key, el.value);
            }

            if (pendingFiles.avatar) localStorage.setItem('sh_avatar', pendingFiles.avatar);
            if (pendingFiles.banner) localStorage.setItem('sh_banner', pendingFiles.banner);
            
            // Sync with Cloudflare DB
            const userData = {
                username: localStorage.getItem('sh_username') || 'siyah',
                short_desc: localStorage.getItem('sh_short_desc') || 'Verified Creator',
                avatar: localStorage.getItem('sh_avatar') || ''
            };
            fetch('/api/register', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(userData) 
            });

            if (pendingFiles.post) {
                mediaGallery.unshift({
                    type: pendingFiles.post.includes('video') ? 'video' : 'image',
                    url: pendingFiles.post,
                    user: localStorage.getItem('sh_username') || 'siyah'
                });
                pendingFiles.post = null;
                const status = document.getElementById('post_status');
                if (status) status.style.display = 'none';
                showToast('Media broadcasted to StarHUB!', 'success');
            }

            showToast('StarHUB Creator Profile is now LIVE!', 'success');
            renderView('Dashboard');
        }

        function renderView(viewName, params = {}) {
            const content = document.getElementById('mainContent');
            content.style.opacity = '0';
            content.style.transform = 'translateY(15px)';
            
            setTimeout(() => {
                const template = views[viewName] || `
                    <div class="section" style="text-align: center; padding-top: 10rem;">
                        <i data-lucide="help-circle" style="width: 64px; height: 64px; color: var(--accent-primary); margin-bottom: 2rem;"></i>
                        <h2>Page Not Found</h2>
                        <a href="/Home" class="btn btn-primary" style="margin-top: 2rem;" onclick="navigateTo('/Home')">Go Back Home</a>
                    </div>
                `;
                
                content.innerHTML = template;
                
                if (viewName === 'Community') {
                    // Fetch real data from Cloudflare DB
                    fetch('/api/members').then(r => r.json()).then(data => {
                        const community = document.getElementById('community_list_container');
                        if (community && data.length > 0) {
                            community.innerHTML = data.map(user => `
                                <div class="creator-card animate">
                                    <div class="creator-header">
                                        <div class="creator-avatar" style="background: var(--bg-tertiary); background-image: url('${user.avatar}'); background-size: cover;"></div>
                                        <div class="creator-info">
                                            <h4>${user.username}</h4>
                                            <span style="font-size: 0.7rem; color: var(--text-muted); opacity: 0.8; font-weight: 700;">Verified Account</span>
                                        </div>
                                    </div>
                                    <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem;">${user.short_desc || 'StarHUB Community Member'}</p>
                                    <button class="btn btn-outline" style="width: 100%; border-color: var(--accent-glow); color: var(--accent-primary);" onclick="navigateTo('/${user.username}')">View Profile</button>
                                </div>
                            `).join('');
                        }
                    });
                }
                
                if (viewName === 'Media') {
                    const gallery = document.getElementById('media_gallery_container');
                    if (gallery) {
                        gallery.innerHTML = mediaGallery.map(item => `
                            <div class="creator-card animate" style="padding: 0; overflow: hidden; height: 350px;">
                                ${item.type === 'video' ? 
                                    `<video src="${item.url}" autoplay muted loop style="width:100%; height:100%; object-fit:cover;"></video>` :
                                    `<div style="width:100%; height:100%; background: url('${item.url}') center/cover no-repeat;"></div>`
                                }
                                <div class="media-info-overlay">
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <div style="width: 20px; height: 20px; border-radius: 50%; background: var(--accent-primary);"></div>
                                        <span style="font-size: 0.8rem; font-weight: 700;">${item.user}</span>
                                    </div>
                                    <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">Shared on StarHUB</p>
                                </div>
                            </div>
                        `).join('');
                    }
                }

                if (viewName === 'Profile' && params.username) {
                    const banner = document.getElementById('p_banner');
                    const avatar = document.getElementById('p_avatar');
                    const name = document.getElementById('p_name');
                    const shortDesc = document.getElementById('p_short');
                    const bio = document.getElementById('p_bio');
                    const socials = document.getElementById('p_socials');

                    const data = {
                        name: params.username,
                        short: params.short_desc || 'Verified StarHUB Creator',
                        bio: params.bio || 'Professional StarHUB talent.',
                        avatar: params.avatar || '',
                        banner: params.banner || '',
                        socials: {
                            insta: params.insta || '',
                            tiktok: params.tiktok || '',
                            discord: params.discord || ''
                        }
                    };

                    if (name) name.innerText = data.name;
                    if (shortDesc) shortDesc.innerText = data.short;
                    if (bio) bio.innerText = data.bio;

                    if (banner && data.banner) {
                        const isVideo = data.banner.includes('video/mp4') || data.banner.includes('video/webm') || data.banner.includes('video/quicktime');
                        if (isVideo) {
                            banner.innerHTML = `<video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover;"><source src="${data.banner}"></video>`;
                        } else {
                            banner.style.backgroundImage = `url('${data.banner}')`;
                        }
                    }

                    if (avatar && data.avatar) {
                        avatar.innerHTML = '';
                        avatar.style.backgroundImage = `url('${data.avatar}')`;
                    }

                    if (socials) {
                        socials.innerHTML = '';
                        const platforms = [
                            { key: 'insta', icon: 'instagram', color: '#E1306C' },
                            { key: 'tiktok', icon: 'music', color: '#ff0050' },
                            { key: 'discord', icon: 'message-square', color: '#5865F2' }
                        ];
                        platforms.forEach(p => {
                            const url = data.socials[p.key];
                            if (url) {
                                socials.innerHTML += `<a href="${url}" target="_blank" class="btn btn-ghost" style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid ${p.color}; color: ${p.color};"><i data-lucide="${p.icon}"></i></a>`;
                            }
                        });
                        if (socials.innerHTML === '') socials.style.display = 'none';
                    }
                }

                content.style.opacity = '1';
                content.style.transform = 'translateY(0)';
                lucide.createIcons();
                initAnimations();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        function switchDashboardTab(tab, el) {
            // Remove active class from all tabs and buttons
            document.querySelectorAll('.dash-nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.dash-tab-content').forEach(content => content.classList.remove('active'));
            
            // Activate target tab and button
            const targetContent = document.getElementById('dash_' + tab);
            if (targetContent) targetContent.classList.add('active');
            
            if (el) {
                el.classList.add('active');
            } else {
                // If called via quick access, find the button
                const btn = document.querySelector(`.dash-nav-item[data-tab="${tab}"]`);
                if (btn) btn.classList.add('active');
            }
            
            lucide.createIcons();
        }

        function navigateTo(url) {
            if (event) event.preventDefault();
            window.history.pushState({}, '', url);
            router();
        }

        function router() {
            const path = window.location.pathname === '/' ? '/Home' : window.location.pathname;
            const viewName = path.startsWith('/') ? path.slice(1) : path;
            
            if (views[viewName]) {
                renderView(viewName);
                updateNavActive(viewName);
            } else {
                // Pre-fetch all creator meta
                const params = {
                    username: viewName,
                    short_desc: localStorage.getItem('sh_short_desc'),
                    bio: localStorage.getItem('sh_bio'),
                    avatar: localStorage.getItem('sh_avatar'),
                    banner: localStorage.getItem('sh_banner'),
                    insta: localStorage.getItem('sh_insta'),
                    tiktok: localStorage.getItem('sh_tiktok'),
                    discord: localStorage.getItem('sh_discord')
                };
                renderView('Profile', params);
            }
        }

        function updateNavActive(viewName) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.querySelector('span').innerText === viewName) item.classList.add('active');
            });
        }

        window.addEventListener('popstate', router);
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('code')) {
                showToast('Successfully linked Discord to StarHUB!', 'success');
                localStorage.setItem('sh_logged_in', 'true');
                
                // Add to Cloudflare DB
                const userData = {
                    username: localStorage.getItem('sh_username') || 'siyah',
                    short_desc: localStorage.getItem('sh_short_desc') || 'Verified Creator',
                    avatar: localStorage.getItem('sh_avatar') || ''
                };
                
                fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                }).then(() => {
                    window.history.replaceState({}, document.title, '/Dashboard');
                    router();
                });
            }
            
            checkLoginState();
            router();
        });

        function checkLoginState() {
            if (localStorage.getItem('sh_logged_in') === 'true') {
                const loginBtn = document.getElementById('loginBtn');
                if (loginBtn) {
                    loginBtn.innerHTML = '<i data-lucide="layout-dashboard" style="width: 18px; margin-right: 8px;"></i> Dashboard';
                    loginBtn.onclick = () => navigateTo('/Dashboard');
                    lucide.createIcons();
                }
            }
        }

        function updateNav(el, viewName) {
            navigateTo('/' + viewName);
        }

        function viewProfile(name) {
            openModal(`
                <div style="text-align: center; padding: 2rem;">
                    <div style="width: 100px; height: 100px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center;">
                        <img src="logo.png" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <h2 style="font-family: var(--font-montserrat); margin-bottom: 0.5rem;">${name}</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 2rem;">StarHUB Verified Creator</p>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 2rem;" onclick="closeModal()">Hire Now</button>
                    <button class="btn btn-ghost" style="width: 100%; margin-top: 0.5rem;" onclick="closeModal(); navigateTo('/${name}')">View Detailed Profile</button>
                </div>
            `);
        }

        function initAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.animate').forEach(el => observer.observe(el));
        }
    </script>
</body>
