<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarHUB | Güvenli Giriş</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="login-body-enhanced">
    <div class="stars"></div>
    <div class="premium-bg"></div>
    <div class="vignette"></div>

    <main class="login-container">
        <div class="brand">
            <img src="logo.png" alt="StarHUB" class="brand-logo">
            <h1 class="brand-title">STARHUB</h1>
        </div>

        <div class="auth-card-premium">
            <div class="auth-header">
                <h2>Oturum Aç</h2>
                <p>StarHUB dünyasına ilk adımını at. Profilini oluşturmak ve rankını senkronize etmek için güvenli giriş yap.</p>
            </div>

            <div class="auth-body">
                <a href="https://discord.com/oauth2/authorize?client_id=1486756004883595284&response_type=code&redirect_uri=https%3A%2F%2Fstarhub.lol%2Fauth%2Fcallback&scope=identify+guilds.join+email" class="discord-auth-btn">
                    <img src="https://assets-global.website-files.com/6257adef93467e4228800e00/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord" class="discord-logo-icon">
                    <span class="auth-text">DISCORD İLE BAĞLAN</span>
                </a>

                <div class="auth-separator">
                    <span>VEYA</span>
                </div>

                <!-- Riot Login Section -->
                <div id="riotLoginContainer">
                    <button class="riot-auth-btn" id="showRiotInput" style="width: 100%; border: none; cursor: pointer;">
                        <img src="logo.png" alt="Riot" class="riot-logo-icon" style="width: 24px;">
                        <span class="auth-text">RIOT GAMES BAĞLA</span>
                    </button>
                    
                    <div id="riotInputArea" style="display: none; margin-top: 15px; animation: slideDown 0.4s ease;">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="riotIdInput" placeholder="Nick#Tag" 
                                style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
                                       color: white; padding: 12px; border-radius: 12px; font-family: inherit; font-weight: 600;">
                            <button id="doRiotLogin" class="primary-btn" style="padding: 10px 20px; border-radius: 12px;">GİRİŞ</button>
                        </div>
                        <p id="riotError" style="color: #ff4655; font-size: 0.8rem; margin-top: 8px; font-weight: 700; display: none;">Profil bulunamadı veya gizli!</p>
                    </div>
                </div>
            </div>

            <div class="auth-footer-detailed">
                <div class="secure-label">
                    <span class="lock-icon">🔒</span>
                    <span class="lock-text">END-TO-END ENCRYPTED AUTH</span>
                </div>
                <div class="legal-footer-links">
                    <a href="/">Ana Sayfa</a>
                    <a href="#">Şartlar</a>
                    <a href="#">Gizlilik</a>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-home-btn">← Ana Sayfaya Dön</a>
    </main>

    <script>
        // Star generation
        const starsContainer = document.querySelector('.stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            starsContainer.appendChild(star);
        }

        // --- Riot Login Logic ---
        const btnShowInput = document.getElementById('showRiotInput');
        const inputArea = document.getElementById('riotInputArea');
        const riotIdInput = document.getElementById('riotIdInput');
        const btnLogin = document.getElementById('doRiotLogin');
        const errorMsg = document.getElementById('riotError');

        btnShowInput.addEventListener('click', () => {
            btnShowInput.style.display = 'none';
            inputArea.style.display = 'block';
            riotIdInput.focus();
        });

        btnLogin.addEventListener('click', async () => {
            const valId = riotIdInput.value.trim();
            if (!valId.includes('#')) {
                errorMsg.textContent = 'Format: Nick#Tag olmalı!';
                errorMsg.style.display = 'block';
                return;
            }

            const [name, tag] = valId.split('#');
            btnLogin.textContent = '...';
            btnLogin.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Riot hesabını doğrula (Account API ile en sağlam kontrol)
                const res = await fetch(`https://api.henrikdev.xyz/valorant/v1/account/${name}/${tag}`);
                if (res.ok) {
                    const apiData = await res.json();
                    
                    // Session objesi oluştur (Unique PUUID kullanarak)
                    const sessionData = {
                        id: `riot_${apiData.data.puuid}`,
                        username: apiData.data.name,
                        avatarUrl: apiData.data.card ? apiData.data.card.small : '/logo.png',
                        riot_name: apiData.data.name,
                        riot_tag: apiData.data.tag,
                        region: apiData.data.region || 'eu',
                        is_riot_login: true
                    };

                    // LocalStorage ve Cookie'ye kaydet
                    const sessionStr = JSON.stringify(sessionData);
                    localStorage.setItem('shub_user', sessionStr);
                    
                    // Kalıcı Cookie Ayarla (30 Gün)
                    const sessionB64 = btoa(unescape(encodeURIComponent(sessionStr)));
                    const expires = new Date();
                    expires.setTime(expires.getTime() + (30 * 24 * 60 * 60 * 1000));
                    document.cookie = `shub_session=${sessionB64}; Path=/; Expires=${expires.toUTCString()}; SameSite=Lax; Secure`;

                    // Dashboard yönlendirmesi
                    window.location.href = '/dashboard.html#riot_login';
                } else {
                    errorMsg.textContent = 'Hesap bulunamadı!';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'API hatası oluştu.';
                errorMsg.style.display = 'block';
            } finally {
                btnLogin.textContent = 'GİRİŞ';
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
