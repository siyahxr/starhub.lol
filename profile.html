<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | StarHUB</title>
    <meta name="description" content="StarHUB Elite Oyuncu Profili">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        /* Critical inline styles for profile page */
        :root {
            --accent-teal: #a0c4d6;
            --accent-glow: rgba(160, 196, 214, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-secondary: rgba(255, 255, 255, 0.4);
        }

        body {
            background: #050608;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .profile-page-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .profile-topbar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3rem 2rem;
        }

        .ptb-logo {
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: #fff;
            font-weight: 950; font-size: 1.4rem; letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ptb-logo img { width: 40px; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        .ptb-btn {
            background: #fff; color: #000;
            padding: 1rem 2rem; border-radius: 16px;
            text-decoration: none; font-weight: 950;
            font-size: 0.9rem; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 1px;
        }

        .ptb-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }

        .profile-card-outer {
            width: 100%; max-width: 900px;
            padding: 0 2rem 6rem;
        }

        .pc-wrap {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(80px);
            border-radius: 40px;
            overflow: hidden;
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pc-banner {
            width: 100%; height: 280px;
            background: linear-gradient(135deg, #0a1014 0%, #1a242b 100%);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .pc-body { padding: 0 3.5rem 3.5rem; }

        .pc-top-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-top: -70px;
            margin-bottom: 2.5rem;
        }

        .pc-avatar-box { position: relative; }

        .pc-avatar {
            width: 140px; height: 140px;
            border-radius: 40px;
            border: 8px solid #050608;
            background: #050608;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .pc-online {
            position: absolute; bottom: 12px; right: 0;
            width: 24px; height: 24px;
            background: #2ecc71; border-radius: 50%;
            border: 5px solid #050608;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .pc-badges { display: flex; gap: 0.8rem; padding-bottom: 1rem; }

        .pc-badge {
            background: rgba(160, 196, 214, 0.08);
            color: var(--accent-teal);
            border: 1px solid rgba(160, 196, 214, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 950;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .pc-badge.verified { background: rgba(5,6,8,0.2); color: #fff; border-color: var(--glass-border); }

        .pc-name-row { margin-bottom: 0.8rem; }

        .pc-name {
            font-size: 2.8rem; font-weight: 950;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            display: flex; align-items: center; gap: 1rem;
        }

        .pc-disc { color: rgba(255,255,255,0.15); font-size: 1.5rem; letter-spacing: 0; }
        .pc-bio { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 1.2rem; font-weight: 500; }
        .pc-slug-link { font-size: 0.9rem; color: var(--accent-teal); font-weight: 900; text-decoration: none; border-bottom: 1px solid rgba(160, 196, 214, 0.2); transition: 0.3s; }
        .pc-slug-link:hover { color: #fff; border-color: #fff; }

        .pc-divider { height: 1px; background: var(--glass-border); margin: 3rem 0; }

        .pc-stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .stat-group {
            background: rgba(255,255,255,0.01);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
        }

        .pc-stat-label {
            font-size: 0.7rem; letter-spacing: 3px;
            color: rgba(255,255,255,0.25); font-weight: 950;
            text-transform: uppercase; margin-bottom: 1.8rem;
        }

        .pc-rank-row { display: flex; align-items: center; gap: 1.5rem; }
        .pc-rank-img { width: 70px; filter: drop-shadow(0 0 20px var(--accent-glow)); }
        .pc-rank-name { font-size: 1.8rem; font-weight: 950; text-transform: uppercase; }
        .pc-rank-rr { font-size: 1rem; color: var(--accent-teal); font-weight: 800; letter-spacing: 1px; }
        .pc-platform-name { font-size: 1.6rem; font-weight: 950; margin-bottom: 0.6rem; text-transform: uppercase; }
        .pc-platform-sub { font-size: 0.9rem; color: #2ecc71; font-weight: 800; letter-spacing: 1px; }

        .pc-footer-row {
            display: flex; gap: 1.2rem;
            margin-top: 3.5rem;
        }

        .pc-footer-btn {
            flex: 1; text-align: center;
            padding: 1.2rem; border-radius: 18px;
            text-decoration: none; font-weight: 950;
            font-size: 0.9rem; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .pc-footer-btn.blurple { background: #5865F2; color: #fff; box-shadow: 0 10px 30px rgba(88,101,242,0.2); }
        .pc-footer-btn.blurple:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(88,101,242,0.4); }
        .pc-footer-btn.ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; }
        .pc-footer-btn.ghost:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }

        /* NOT FOUND STATE */
        .nf-state {
            text-align: center;
            padding: 6rem 3rem;
        }
        .nf-state h2 { font-size: 3.5rem; font-weight: 950; letter-spacing: -2px; margin-bottom: 1rem; }
        .nf-state p { color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 3rem; font-weight: 500; }
        .nf-btn {
            display: inline-block;
            background: var(--accent-teal); color: #000;
            padding: 1.2rem 3.5rem; border-radius: 18px;
            text-decoration: none; font-weight: 950; transition: 0.3s;
            letter-spacing: 1px;
        }
    </style>
</head>
<body style="background:#080a0c; color:#fff; font-family:'Outfit',sans-serif;">
    <div class="stars"></div>
    <div class="premium-bg"></div>
    <div class="vignette"></div>

    <div class="profile-page-wrap">
        <div class="profile-topbar">
            <a href="/" class="ptb-logo">
                <img src="/logo.png" alt="StarHUB">
                StarHUB
            </a>
            <a href="/login.html" class="ptb-btn">Profilini Oluştur →</a>
        </div>

        <div class="profile-card-outer" id="profileContent">
            <!-- JS ile doldurulacak -->
            <div class="pc-wrap">
                <div class="nf-state">
                    <h2>⏳ Yükleniyor...</h2>
                    <p>Profil bilgileri getiriliyor.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Stars
        const starsEl = document.querySelector('.stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = `${Math.random() * 100}%`;
            s.style.top = `${Math.random() * 100}%`;
            s.style.animationDelay = `${Math.random() * 5}s`;
            starsEl.appendChild(s);
        }

        // URL'den slug'ı al (örn: starhub.lol/siyah → siyah)
        const slug = window.location.pathname.replace('/', '').split('/')[0];

        // Rank tier ID mapping (seviyeye göre)
        const rankImages = {
            'Iron': '3', 'Bronze': '6', 'Silver': '9', 'Gold': '12',
            'Platinum': '15', 'Diamond': '18', 'Ascendant': '21',
            'Immortal': '24', 'Radiant': '27', 'Unranked': '0'
        };

        function getRankImgUrl(rankName) {
            const base = 'https://media.valorant-api.com/competitivetiers/03621f13-4331-1663-df26-68b375b43de1';
            const tier = Object.keys(rankImages).find(k => rankName && rankName.includes(k));
            const num = tier ? rankImages[tier] : '0';
            return `${base}/${num}/largeicon.png`;
        }

        function renderProfile(p) {
            const bannerStyle = p.banner_url
                ? `background-image:url('${p.banner_url}'); background-size:cover; background-position:center;`
                : '';
            const avatarUrl = p.avatar_url || '/logo.png';
            const rankImg = getRankImgUrl(p.rank_name);
            const rankName = p.rank_name || 'Unranked';
            const rankRR = p.rank_rr || 0;

            document.getElementById('profileContent').innerHTML = `
                <div class="pc-wrap">
                    <div class="pc-banner" style="${bannerStyle}"></div>
                    <div class="pc-body">
                        <div class="pc-top-row">
                            <div class="pc-avatar-box">
                                <img src="${avatarUrl}" alt="${p.username}" class="pc-avatar" onerror="this.src='/logo.png'">
                                <div class="pc-online"></div>
                            </div>
                            <div class="pc-badges">
                                <span class="pc-badge">✦ ELITE</span>
                                <span class="pc-badge verified">Discord ✓</span>
                            </div>
                        </div>

                        <div class="pc-name-row">
                            <h1 class="pc-name">${p.username}<span class="pc-disc">#${p.discriminator || '0000'}</span></h1>
                        </div>
                        <p class="pc-bio">${p.bio || 'StarHUB Elite Creator'}</p>
                        <a href="/${p.slug}" class="pc-slug-link">starhub.lol/${p.slug}</a>

                        <div class="pc-divider"></div>

                        <div class="pc-stats-row">
                            <div class="stat-group">
                                <div class="pc-stat-label">Valorant Rank</div>
                                <div class="pc-rank-row">
                                    <img src="${rankImg}" alt="${rankName}" class="pc-rank-img" onerror="this.style.display='none'">
                                    <div>
                                        <div class="pc-rank-name">${rankName}</div>
                                        <div class="pc-rank-rr">${rankRR} RR</div>
                                    </div>
                                </div>
                            </div>
                            <div class="stat-group">
                                <div class="pc-stat-label">Doğrulama</div>
                                <div class="pc-platform-name">STARHUB</div>
                                <div class="pc-platform-sub">🛡️ DISCORD VERIFIED</div>
                            </div>
                        </div>

                        <div class="pc-footer-row">
                            <a href="https://discord.gg/starhub" class="pc-footer-btn blurple" target="_blank">Discord'a Katıl</a>
                            <a href="/login.html" class="pc-footer-btn ghost">Kendi Profilini Oluştur</a>
                        </div>
                    </div>
                </div>
            `;
            document.title = `${p.username} | StarHUB`;
        }

        function renderNotFound(slug) {
            document.getElementById('profileContent').innerHTML = `
                <div class="pc-wrap">
                    <div class="nf-state">
                        <h2>😶 Profil Bulunamadı</h2>
                        <p><strong>${slug}</strong> adında bir kullanıcı henüz kayıtlı değil.</p>
                        <a href="/login.html" class="nf-btn">Profilini Oluştur</a>
                    </div>
                </div>
            `;
            document.title = 'Profil Bulunamadı | StarHUB';
        }

        async function loadProfile() {
            if (!slug || ['index', 'login', 'dashboard', 'profile', 'style', 'bg', 'logo', 'riot', 'schema'].includes(slug)) {
                window.location.href = '/';
                return;
            }
            try {
                const res = await fetch(`/api/profile?slug=${encodeURIComponent(slug)}`);
                if (res.ok) {
                    const profile = await res.json();
                    renderProfile(profile);
                } else {
                    renderNotFound(slug);
                }
            } catch (e) {
                renderNotFound(slug);
            }
        }

        loadProfile();
    </script>
</body>
</html>
