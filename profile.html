<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | StarHUB</title>
    <meta name="description" content="StarHUB Elite Oyuncu Profili">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        /* Critical inline styles for profile page */
        :root {
            --accent-teal: #a0c4d6;
            --accent-glow: rgba(160, 196, 214, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-secondary: rgba(255, 255, 255, 0.4);
        }

        body {
            background: #050608;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .profile-page-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .profile-topbar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3rem 2rem;
        }

        .ptb-logo {
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: #fff;
            font-weight: 950; font-size: 1.4rem; letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ptb-logo img { width: 40px; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        .ptb-btn {
            background: #fff; color: #000;
            padding: 1rem 2rem; border-radius: 16px;
            text-decoration: none; font-weight: 950;
            font-size: 0.9rem; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 1px;
        }

        .ptb-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }

        .profile-card-outer {
            width: 100%; max-width: 500px;
            padding: 0 1rem 6rem;
        }

        .pc-wrap {
            background: rgba(10, 12, 16, 0.4);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(50px);
            border-radius: 40px;
            overflow: hidden;
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pc-banner {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, #0a1014 0%, #1a242b 100%);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .pc-body { padding: 0 2rem 2.5rem; }

        .pc-top-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-top: -50px;
            margin-bottom: 2rem;
        }

        .pc-avatar-box { position: relative; }

        .pc-avatar {
            width: 100px; height: 100px;
            border-radius: 30px;
            border: 5px solid #080a0c;
            background: #080a0c;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .pc-online {
            position: absolute; bottom: 6px; right: -2px;
            width: 18px; height: 18px;
            background: #2ecc71; border-radius: 50%;
            border: 4px solid #080a0c;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .pc-badges { display: flex; gap: 0.5rem; padding-bottom: 0.8rem; }

        .pc-badge {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255,255,255,0.6);
            border: 1px solid var(--glass-border);
            padding: 0.4rem 0.9rem;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 950;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .pc-badge.verified { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.1); }

        .pc-name-row { margin-bottom: 0.4rem; }

        .pc-name {
            font-size: 1.8rem; font-weight: 950;
            letter-spacing: -1px;
            text-transform: uppercase;
            display: flex; align-items: center; gap: 0.6rem;
        }

        .pc-disc { color: rgba(255,255,255,0.1); font-size: 1rem; letter-spacing: 0; }
        .pc-bio { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.4; margin-bottom: 1.2rem; font-weight: 500; }
        .pc-slug-link { font-size: 0.8rem; color: var(--accent-teal); font-weight: 800; text-decoration: none; transition: 0.3s; padding-bottom: 2px; border-bottom: 1px solid rgba(160, 196, 214, 0.1); }
        .pc-slug-link:hover { color: #fff; border-color: #fff; }

        .pc-divider { height: 1px; background: rgba(255,255,255,0.03); margin: 2rem 0; }

        /* Social Badges System (Inline) */
        .social-grid { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.5rem; }
        .social-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 0.4rem 1rem; border-radius: 10px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
            text-decoration: none !important; font-size: 0.65rem; font-weight: 950;
            color: rgba(255,255,255,0.6) !important; text-transform: uppercase; letter-spacing: 1px;
        }
        .social-badge:hover { transform: translateY(-3px); color: #fff !important; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .social-badge svg { width: 14px; height: 14px; fill: currentColor; transition: 0.3s; }
        .social-badge.yt:hover { background: #FF0000; border-color: #FF0000; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
        .social-badge.ig:hover { background: linear-gradient(45deg, #f09433 0%, #dc2743 100%); border-color: transparent; }
        .social-badge.tk:hover { background: #000; border-color: #FE2C55; }
        .social-badge.dc:hover { background: #5865F2; }
        .social-badge.tw:hover { background: #9146FF; }

        .pc-stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .stat-group {
            background: rgba(255,255,255,0.01);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .pc-stat-label {
            font-size: 0.6rem; letter-spacing: 2px;
            color: rgba(255,255,255,0.2); font-weight: 950;
            text-transform: uppercase; margin-bottom: 1.2rem;
        }

        .pc-rank-row { display: flex; align-items: center; gap: 1rem; }
        .pc-rank-img { width: 50px; filter: drop-shadow(0 0 20px var(--accent-glow)); }
        .pc-rank-name { font-size: 1.3rem; font-weight: 950; text-transform: uppercase; }
        .pc-rank-rr { font-size: 0.8rem; color: var(--accent-teal); font-weight: 800; letter-spacing: 0.5px; }
        .pc-platform-name { font-size: 1.1rem; font-weight: 950; margin-bottom: 0.4rem; text-transform: uppercase; }
        .pc-platform-sub { font-size: 0.75rem; color: #2ecc71; font-weight: 800; letter-spacing: 1px; }

        .pc-footer-row {
            display: flex; gap: 1rem;
            margin-top: 2.5rem;
        }

        .pc-footer-btn {
            flex: 1; text-align: center;
            padding: 1rem; border-radius: 15px;
            text-decoration: none; font-weight: 950;
            font-size: 0.85rem; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .pc-footer-btn.blurple { background: #5865F2; color: #fff; box-shadow: 0 10px 30px rgba(88,101,242,0.2); }
        .pc-footer-btn.blurple:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(88,101,242,0.4); }
        .pc-footer-btn.ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; }
        .pc-footer-btn.ghost:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }

        /* NOT FOUND STATE */
        .nf-state {
            text-align: center;
            padding: 6rem 3rem;
        }
        .nf-state h2 { font-size: 3.5rem; font-weight: 950; letter-spacing: -2px; margin-bottom: 1rem; }
        .nf-state p { color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 3rem; font-weight: 500; }
        .nf-btn {
            display: inline-block;
            background: var(--accent-teal); color: #000;
            padding: 1.2rem 3.5rem; border-radius: 18px;
            text-decoration: none; font-weight: 950; transition: 0.3s;
            letter-spacing: 1px;
        }
    </style>
</head>
<body style="background:#080a0c; color:#fff; font-family:'Outfit',sans-serif;">
    <div class="stars"></div>
    <div class="premium-bg"></div>
    <div class="vignette"></div>

    <div class="profile-page-wrap">
        <div class="profile-topbar">
            <a href="/" class="ptb-logo">
                <img src="/logo.png" alt="StarHUB">
                StarHUB
            </a>
            <a href="/login.html" class="ptb-btn">Profilini Oluştur →</a>
        </div>

        <div class="profile-card-outer" id="profileContent">
            <!-- JS ile doldurulacak -->
            <div class="pc-wrap">
                <div class="nf-state">
                    <h2>⏳ Yükleniyor...</h2>
                    <p>Profil bilgileri getiriliyor.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Stars
        const starsEl = document.querySelector('.stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = `${Math.random() * 100}%`;
            s.style.top = `${Math.random() * 100}%`;
            s.style.animationDelay = `${Math.random() * 5}s`;
            starsEl.appendChild(s);
        }

        // URL'den slug'ı al (örn: starhub.lol/siyah → siyah)
        const slug = window.location.pathname.replace('/', '').split('/')[0];

        // Rank tier ID mapping (seviyeye göre)
        const rankImages = {
            'Iron': '3', 'Bronze': '6', 'Silver': '9', 'Gold': '12',
            'Platinum': '15', 'Diamond': '18', 'Ascendant': '21',
            'Immortal': '24', 'Radiant': '27', 'Unranked': '0'
        };

        function getRankImgUrl(rankName) {
            const base = 'https://media.valorant-api.com/competitivetiers/03621f13-4331-1663-df26-68b375b43de1';
            const tier = Object.keys(rankImages).find(k => rankName && rankName.includes(k));
            const num = tier ? rankImages[tier] : '0';
            return `${base}/${num}/largeicon.png`;
        }

        const icons = {
            yt: `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
            ig: `<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4.162 4.162 0 1 1 0-8.324A4.162 4.162 0 0 1 12 16zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>`,
            tk: `<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.33-.85.51-1.33 1.47-1.3 2.44.02 1.01.64 1.98 1.55 2.4.61.3 1.29.42 1.96.38.64-.02 1.28-.21 1.83-.53.53-.31.96-.79 1.23-1.35.29-.58.42-1.24.39-1.89.01-3.14-.01-6.29.01-9.43z"/></svg>`,
            tw: `<svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>`,
            dc: `<svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z"/></svg>`
        };

        function renderSocials(p) {
            let html = '';
            if (p.yt_url && p.yt_url.trim() !== '') html += `<a href="${p.yt_url}" target="_blank" class="social-badge yt" title="YouTube">${icons.yt} YouTube</a>`;
            if (p.ig_url && p.ig_url.trim() !== '') html += `<a href="${p.ig_url}" target="_blank" class="social-badge ig" title="Instagram">${icons.ig} Instagram</a>`;
            if (p.tk_url && p.tk_url.trim() !== '') html += `<a href="${p.tk_url}" target="_blank" class="social-badge tk" title="TikTok">${icons.tk} TikTok</a>`;
            if (p.tw_url && p.tw_url.trim() !== '') html += `<a href="${p.tw_url}" target="_blank" class="social-badge tw" title="Twitch">${icons.tw} Twitch</a>`;
            if (p.dc_id && p.dc_id.trim() !== '')   html += `<a href="#" onclick="alert('Discord: ${p.dc_id}'); return false;" class="social-badge dc" title="Discord">${icons.dc} Discord</a>`;
            return html;
        }

        function renderProfile(p) {
            console.log('Rendering Profile:', p); // Debug için
            const bannerStyle = p.banner_url
                ? `background-image:url('${p.banner_url}'); background-size:cover; background-position:center;`
                : '';
            const avatarUrl = p.avatar_url || '/logo.png';
            const rankImg = getRankImgUrl(p.rank_name);
            const rankName = p.rank_name || 'Unranked';
            const rankRR = p.rank_rr || 0;
            const socialHtml = renderSocials(p);

            document.getElementById('profileContent').innerHTML = `
                <div class="pc-wrap">
                    <div class="pc-banner" style="${bannerStyle}"></div>
                    <div class="pc-body">
                        <div class="pc-top-row">
                            <div class="pc-avatar-box">
                                <img src="${avatarUrl}" alt="${p.username}" class="pc-avatar" onerror="this.src='/logo.png'">
                                <div class="pc-online"></div>
                            </div>
                            <div class="pc-badges-wrapper" style="display:flex; flex-direction:column; align-items:flex-end; gap:0.8rem;">
                                <div class="pc-badges">
                                    <span class="pc-badge">✦ ELITE</span>
                                    <span class="pc-badge verified">Verified ✓</span>
                                </div>
                                <div class="social-grid">
                                    ${socialHtml}
                                </div>
                            </div>
                        </div>

                        <div class="pc-name-row">
                            <h1 class="pc-name">${p.username}<span class="pc-disc">#${p.discriminator || '0000'}</span></h1>
                        </div>
                        <p class="pc-bio">${p.bio || 'StarHUB Elite Creator'}</p>
                        <a href="/${p.slug}" class="pc-slug-link">starhub.lol/${p.slug}</a>

                        <div class="pc-divider"></div>

                        <div class="pc-stats-row">
                            <div class="stat-group">
                                <div class="pc-stat-label">Valorant Rank</div>
                                <div class="pc-rank-row">
                                    <img src="${rankImg}" alt="${rankName}" class="pc-rank-img" onerror="this.style.display='none'">
                                    <div>
                                        <div class="pc-rank-name">${rankName}</div>
                                        <div class="pc-rank-rr">${rankRR} RR</div>
                                    </div>
                                </div>
                            </div>
                            <div class="stat-group">
                                <div class="pc-stat-label">Doğrulama</div>
                                <div class="pc-platform-name">STARHUB</div>
                                <div class="pc-platform-sub">🛡️ PREMIUM VERIFIED</div>
                            </div>
                        </div>

                        <div class="pc-footer-row">
                            <a href="https://discord.gg/starhub" class="pc-footer-btn blurple" target="_blank">Discord'a Katıl</a>
                            <a href="/login.html" class="pc-footer-btn ghost">Kendi Profilini Oluştur</a>
                        </div>
                    </div>
                </div>
            `;
            document.title = `${p.username} | StarHUB`;
        }

        function renderNotFound(slug) {
            document.getElementById('profileContent').innerHTML = `
                <div class="pc-wrap">
                    <div class="nf-state">
                        <h2>😶 Profil Bulunamadı</h2>
                        <p><strong>${slug}</strong> adında bir kullanıcı henüz kayıtlı değil.</p>
                        <a href="/login.html" class="nf-btn">Profilini Oluştur</a>
                    </div>
                </div>
            `;
            document.title = 'Profil Bulunamadı | StarHUB';
        }

        async function loadProfile() {
            if (!slug || ['index', 'login', 'dashboard', 'profile', 'style', 'bg', 'logo', 'riot', 'schema'].includes(slug)) {
                window.location.href = '/';
                return;
            }
            try {
                const res = await fetch(`/api/profile?slug=${encodeURIComponent(slug)}`);
                if (res.ok) {
                    const profile = await res.json();
                    renderProfile(profile);
                } else {
                    renderNotFound(slug);
                }
            } catch (e) {
                renderNotFound(slug);
            }
        }

        loadProfile();
    </script>
</body>
</html>
